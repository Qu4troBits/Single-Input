services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: singleinput-app
        working_dir: /var/www
        volumes:
            - ./:/var/www
        environment:
            APP_ENV: local
            APP_DEBUG: "true"
            DB_CONNECTION: pgsql
            DB_HOST: postgres
            DB_PORT: 5432
            DB_DATABASE: singleinput
            DB_USERNAME: singleinput
            DB_PASSWORD: singleinput
            REDIS_HOST: redis
            REDIS_PORT: 6379
        depends_on:
            - postgres
            - redis

    nginx:
        image: nginx:1.27-alpine
        container_name: singleinput-nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app

    postgres:
        image: postgres:16-alpine
        container_name: singleinput-postgres
        environment:
            POSTGRES_DB: singleinput
            POSTGRES_USER: singleinput
            POSTGRES_PASSWORD: singleinput
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"

    redis:
        image: redis:7-alpine
        container_name: singleinput-redis
        ports:
            - "6379:6379"

volumes:
    postgres_data:
